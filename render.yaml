databases:
  - name: pranjay-db
    databaseName: pranjay
    user: pranjay_admin
    region: singapore
    plan: free

services:
  # ─── Backend API (FastAPI) ──────────────────────────────────────────────────
  - type: web
    name: pranjay-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pranjay-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      # ── Firebase (paste entire firebase-adminsdk.json as a single-line JSON string) ──
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false   # Set manually in Render dashboard
      # ── Supabase (for product image uploads) ──
      - key: SUPABASE_URL
        sync: false   # Set manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false   # Set manually in Render dashboard
      - key: SUPABASE_BUCKET
        value: products
      # ── Email (Resend) ──
      - key: RESEND_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: EMAIL_FROM
        value: noreply@pranjay.com
      - key: ADMIN_EMAIL
        value: admin@pranjay.com
      # ── Razorpay (switch to live keys for production) ──
      - key: RAZORPAY_KEY_ID
        sync: false   # Set manually in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false   # Set manually in Render dashboard
      # ── CORS: allow your domain + Render frontend URL ──
      - key: CORS_ORIGINS
        value: '["https://pranjay.com","https://www.pranjay.com","https://pranjay-frontend.onrender.com"]'

  # ─── Frontend (Next.js SSR) ─────────────────────────────────────────────────
  - type: web
    name: pranjay-frontend
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        value: https://pranjay-backend.onrender.com
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        value: AIzaSyAfTsaEeiBGA05yRvg0ltwZYlbns9xDk38
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        value: pranjay-ec.firebaseapp.com
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        value: pranjay-ec
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        value: pranjay-ec.firebasestorage.app
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        value: "713668069063"
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        value: "1:713668069063:web:cd1902252d00177dbb60e2"
