services:
  # Backend API Service
  - type: web
    name: pranjay-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480

  # Frontend Next.js Service  
  - type: web
    name: pranjay-frontend
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://pranjay-backend.onrender.com
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        value: AIzaSyAfTsaEeiBGA05yRvg0ltwZYlbns9xDk38
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        value: pranjay-ec.firebaseapp.com
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        value: pranjay-ec
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        value: pranjay-ec.firebasestorage.app
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        value: 713668069063
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        value: 1:713668069063:web:cd1902252d00177dbb60e2
